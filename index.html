<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1400">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>海创元2026年度组织绩效管理系统 V3.1</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif; background:#f3f5f8; color:#1e293b; font-size:13px; }
button { font-family:inherit; cursor:pointer; }
input,textarea,select { font-family:inherit; }
::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-track { background:#eef1f5; }
::-webkit-scrollbar-thumb { background:#c3cbd6; border-radius:4px; }
.hidden { display:none !important; }

:root {
  --brand:#0a3d91;
  --brand-dark:#072c6b;
  --accent:#d4a017;
  --ok:#16a34a;
  --warn:#ea580c;
  --err:#dc2626;
  --mute:#64748b;
  --bord:#e2e8f0;
  --bg:#f3f5f8;
}

.topbar { background:linear-gradient(135deg,var(--brand-dark),var(--brand)); color:#fff; padding:14px 28px; display:flex; align-items:center; gap:20px; box-shadow:0 2px 8px rgba(0,0,0,.1); }
.topbar .logo { display:flex; align-items:center; gap:10px; flex:0 0 auto; }
.topbar .logo .mark { height:38px; width:auto; display:block; object-fit:contain; }
.topbar h1 { font-size:16px; font-weight:700; letter-spacing:.5px; }
.topbar h1 span { font-size:11px; font-weight:400; color:#b9c7e3; margin-left:6px; }
.topbar .role-bar { margin-left:auto; display:flex; align-items:center; gap:8px; }
.topbar .role-bar label { font-size:12px; color:#b9c7e3; }
.topbar select { padding:6px 12px; border-radius:6px; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:#fff; font-size:13px; }
.topbar select option { background:#fff; color:#1e293b; }
.topbar .export-btn { padding:6px 14px; border-radius:6px; border:1px solid var(--accent); background:transparent; color:var(--accent); font-size:12px; font-weight:600; }
.topbar .user-pill { display:flex; align-items:center; gap:8px; padding:4px 10px 4px 4px; background:rgba(255,255,255,.1); border-radius:20px; border:1px solid rgba(255,255,255,.15); }
.topbar .user-pill .up-avatar { width:28px; height:28px; border-radius:50%; background:var(--accent); color:var(--brand-dark); font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; letter-spacing:0; }
.topbar .user-pill .up-info { display:flex; flex-direction:column; line-height:1.2; }
.topbar .user-pill .up-name { font-size:12px; color:#fff; font-weight:700; }
.topbar .user-pill .up-meta { font-size:10px; color:#b9c7e3; }

.monthbar { background:#fff; padding:10px 28px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--bord); flex-wrap:wrap; }
.monthbar .label { font-size:12px; color:var(--mute); }
.monthbar .chip { padding:6px 14px; border-radius:16px; background:#f1f5f9; color:#475569; font-size:12px; font-weight:600; border:1px solid transparent; }
.monthbar .chip.active { background:var(--brand); color:#fff; }
.monthbar .theme { margin-left:auto; font-size:12px; color:#475569; display:flex; align-items:center; gap:8px; }
.monthbar .theme b { color:var(--brand); }

.tabs { background:#fff; padding:0 28px; display:flex; gap:4px; border-bottom:1px solid var(--bord); }
.tabs .tab { padding:12px 20px; background:transparent; border:none; font-size:13px; font-weight:600; color:var(--mute); border-bottom:2px solid transparent; }
.tabs .tab.active { color:var(--brand); border-bottom-color:var(--brand); }

.main { padding:20px 28px 60px; max-width:1400px; margin:0 auto; }
.card { background:#fff; border-radius:10px; padding:18px 22px; box-shadow:0 1px 3px rgba(0,0,0,.04); margin-bottom:16px; }
.card h2 { font-size:15px; font-weight:700; color:#1e293b; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.card h2 .tag { font-size:11px; font-weight:600; padding:2px 8px; border-radius:10px; background:var(--brand); color:#fff; }
.card h2 .tag.accent { background:var(--accent); }
.card h2 small { font-weight:400; color:var(--mute); font-size:12px; margin-left:6px; }

.row { display:flex; flex-wrap:wrap; gap:16px; }
.col { flex:1 1 0; min-width:280px; }
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:16px; }
.kpi { background:#fff; border-radius:10px; padding:14px 18px; border:1px solid var(--bord); }
.kpi .lbl { font-size:11px; color:var(--mute); }
.kpi .val { font-size:26px; font-weight:700; color:var(--brand); margin-top:4px; }
.kpi .sub { font-size:11px; color:var(--mute); margin-top:4px; }
.kpi.accent .val { color:var(--accent); }
.kpi.ok .val { color:var(--ok); }
.kpi.warn .val { color:var(--warn); }

table { width:100%; border-collapse:collapse; font-size:12px; }
th { background:#f8fafc; color:#475569; font-weight:600; padding:9px 12px; text-align:left; border-bottom:2px solid var(--bord); }
td { padding:9px 12px; border-bottom:1px solid #f1f5f9; vertical-align:top; }
tr:hover td { background:#fafbfc; }
.tbl-ct th, .tbl-ct td { text-align:center; }
.tbl-striped tr:nth-child(even) { background:#fafbfc; }

.badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
.badge-A { background:#fef2f2; color:var(--err); }
.badge-B { background:#eff6ff; color:#2563eb; }
.badge-C { background:#f0fdf4; color:var(--ok); }
.badge-core { background:var(--accent); color:#fff; }
.badge-special { background:var(--brand); color:#fff; }
.badge-dup { background:#fffbeb; color:#92400e; border:1px solid #fde68a; }
.badge-guan { background:#e2e8f0; color:#475569; }

/* 类型色 */
.type-signed { background:#f0fdf4; color:var(--ok); border:1px solid #bbf7d0; }
.type-delivery { background:#eff6ff; color:#2563eb; border:1px solid #bfdbfe; }
.type-hr { background:#fff7ed; color:var(--warn); border:1px solid #fed7aa; }
.type-product { background:#eef2ff; color:var(--brand); border:1px solid #c7d2fe; }
.type-ecosystem { background:#fffbeb; color:#92400e; border:1px solid #fde68a; }
.type-channel { background:#faf5ff; color:#7c3aed; border:1px solid #ddd6fe; }
.type-brand { background:#fdf2f8; color:#ec4899; border:1px solid #fbcfe8; }
.type-group_collab { background:#f1f5f9; color:var(--mute); border:1px solid #e2e8f0; }
.type-gov_project { background:#f3f4f6; color:var(--brand-dark); border:1px solid #d1d5db; }
.type-internal_ops { background:#f8fafc; color:#475569; border:1px solid #e2e8f0; }
.type-pill { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; display:inline-block; }

.item { border:1px solid var(--bord); border-radius:8px; padding:12px 16px; margin-bottom:8px; background:#fff; }
.item.core { border-left:4px solid var(--accent); }
.item.special { border-left:4px solid var(--brand); }
.item .i-head { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.item .i-name { flex:1; font-size:13px; font-weight:600; min-width:200px; }
.item .i-meta { font-size:11px; color:var(--mute); margin-top:4px; display:flex; gap:10px; flex-wrap:wrap; }
.item .milestone { margin-top:8px; padding:8px 12px; background:#f8fafc; border-radius:6px; font-size:12px; }
.item .milestone b { color:var(--brand-dark); }
.item .score-btns { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
.score-btn { padding:5px 10px; border-radius:6px; border:1px solid var(--bord); background:#fff; color:var(--mute); font-size:11px; font-weight:600; }
.score-btn.sel-100 { border-color:var(--ok); background:#f0fdf4; color:var(--ok); }
.score-btn.sel-70 { border-color:var(--warn); background:#fff7ed; color:var(--warn); }
.score-btn.sel-0 { border-color:var(--err); background:#fef2f2; color:var(--err); }
.score-btn.sel--1 { border-color:#6b7280; background:#f9fafb; color:#6b7280; }
.score-btn.chosen { box-shadow:0 0 0 2px currentColor inset; }

.bar { width:100%; height:6px; background:#f1f5f9; border-radius:3px; overflow:hidden; margin-top:6px; }
.bar > div { height:100%; background:var(--brand); border-radius:3px; transition:width .4s; }

.inp { padding:4px 8px; border:1px solid var(--bord); border-radius:4px; font-size:12px; width:90px; text-align:right; }
.btn-primary { background:var(--brand); color:#fff; border:none; padding:6px 14px; border-radius:6px; font-size:12px; font-weight:600; }
.btn-ghost { background:#fff; border:1px solid var(--bord); color:var(--mute); padding:6px 14px; border-radius:6px; font-size:12px; }

.legend { font-size:11px; color:var(--mute); padding:10px 14px; background:#f8fafc; border-radius:6px; margin-bottom:12px; line-height:1.8; }
.legend b { color:#1e293b; }

.mask { position:fixed; inset:0; background:rgba(0,0,0,.4); backdrop-filter:blur(2px); display:flex; align-items:center; justify-content:center; z-index:100; }
.mask .box { background:#fff; border-radius:10px; padding:24px; width:min(600px,90vw); max-height:90vh; overflow:auto; }
.mask h3 { font-size:16px; font-weight:700; margin-bottom:12px; }
.mask label { display:block; font-size:12px; color:var(--mute); margin-top:12px; margin-bottom:4px; }
.mask input, .mask textarea, .mask select { width:100%; padding:7px 10px; border:1px solid var(--bord); border-radius:6px; font-size:13px; }
.mask textarea { min-height:70px; resize:vertical; }
.mask .actions { margin-top:20px; display:flex; justify-content:flex-end; gap:10px; }

.trend-svg { width:100%; height:180px; }

.type-filter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.type-filter button { padding:4px 10px; border-radius:12px; font-size:11px; border:1px solid var(--bord); background:#fff; color:var(--mute); font-weight:600; }
.type-filter button.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* ===== V3.1 仪表盘增强 ===== */
.dash-toolbar { display:flex; align-items:center; gap:14px; margin-bottom:14px; flex-wrap:wrap; }
.dash-toolbar .dt-title { font-size:14px; font-weight:700; color:#1e293b; }
.dash-toolbar .dt-sub { font-size:12px; color:var(--mute); }
.view-toggle { display:inline-flex; background:#eef1f5; border-radius:8px; padding:3px; gap:2px; margin-left:auto; }
.view-toggle button { padding:6px 14px; border-radius:6px; border:none; background:transparent; font-size:12px; font-weight:600; color:var(--mute); cursor:pointer; }
.view-toggle button.active { background:#fff; color:var(--brand); box-shadow:0 1px 3px rgba(0,0,0,.08); }

.hero-kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:14px; margin-bottom:18px; }
.hero-kpi { position:relative; padding:18px 22px; border-radius:12px; color:#fff; overflow:hidden; cursor:pointer; transition:transform .2s,box-shadow .2s; }
.hero-kpi:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(10,61,145,.2); }
.hero-kpi.h-blue { background:linear-gradient(135deg,#1e40af,#3b82f6); }
.hero-kpi.h-gold { background:linear-gradient(135deg,#b45309,#f59e0b); }
.hero-kpi.h-green { background:linear-gradient(135deg,#065f46,#10b981); }
.hero-kpi.h-purple { background:linear-gradient(135deg,#5b21b6,#8b5cf6); }
.hero-kpi.h-rose { background:linear-gradient(135deg,#9f1239,#ec4899); }
.hero-kpi .h-tag { font-size:10px; font-weight:600; padding:2px 8px; border-radius:10px; background:rgba(255,255,255,.22); display:inline-block; margin-bottom:8px; letter-spacing:.5px; }
.hero-kpi .h-lbl { font-size:12px; opacity:.92; margin-bottom:4px; font-weight:500; }
.hero-kpi .h-val { font-size:28px; font-weight:800; letter-spacing:-.5px; line-height:1.1; }
.hero-kpi .h-val.small { font-size:22px; }
.hero-kpi .h-unit { font-size:12px; opacity:.85; margin-left:4px; font-weight:500; }
.hero-kpi .h-sub { font-size:11px; opacity:.9; margin-top:8px; display:flex; justify-content:space-between; gap:10px; }
.hero-kpi .h-prog { margin-top:10px; height:5px; background:rgba(255,255,255,.28); border-radius:3px; overflow:hidden; }
.hero-kpi .h-prog > div { height:100%; background:#fff; border-radius:3px; transition:width .4s; }
.hero-kpi .h-chev { position:absolute; top:14px; right:14px; font-size:11px; opacity:.7; }

.section-hd { display:flex; align-items:baseline; gap:10px; margin:6px 4px 10px; }
.section-hd h3 { font-size:14px; font-weight:700; color:#1e293b; }
.section-hd .shd-sub { font-size:12px; color:var(--mute); }
.section-hd .shd-line { flex:1; height:1px; background:linear-gradient(to right,var(--bord),transparent); margin-left:6px; }

.mini-kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(175px,1fr)); gap:10px; margin-bottom:18px; }
.mini-kpi { background:#fff; border:1px solid var(--bord); border-left:3px solid var(--brand); border-radius:8px; padding:12px 14px; cursor:pointer; transition:border-color .2s,box-shadow .2s,transform .2s; }
.mini-kpi:hover { border-color:var(--brand); box-shadow:0 2px 10px rgba(10,61,145,.1); transform:translateY(-1px); }
.mini-kpi.reverse { border-left-color:var(--warn); }
.mini-kpi .mk-lbl { font-size:11px; color:var(--mute); margin-bottom:4px; line-height:1.4; }
.mini-kpi .mk-val { font-size:18px; font-weight:800; color:#1e293b; }
.mini-kpi .mk-val.unfilled { color:#cbd5e1; font-size:14px; font-weight:600; }
.mini-kpi .mk-target { font-size:11px; color:var(--mute); margin-top:2px; }
.mini-kpi .mk-bar { height:3px; background:#eef1f5; border-radius:2px; margin-top:8px; overflow:hidden; }
.mini-kpi .mk-bar > div { height:100%; border-radius:2px; transition:width .4s; }

/* 仪表盘 - 主指标（大）+ 子分项（小）分层 */
.gauge-row-primary { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:12px; }
.gauge-row-sub { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin:0 auto 18px; padding:14px 16px; background:#f8fafc; border:1px dashed #cbd5e1; border-radius:10px; position:relative; }
.gauge-row-sub::before { content:"维度B 综合分 · 子分项构成"; position:absolute; top:-9px; left:18px; background:#f3f5f8; padding:0 10px; font-size:11px; color:var(--mute); font-weight:600; }

.gauge-card { background:#fff; border:1px solid var(--bord); border-radius:10px; padding:16px 14px 14px; text-align:center; cursor:pointer; transition:border-color .2s,box-shadow .2s,transform .2s; }
.gauge-card:hover { border-color:var(--brand); box-shadow:0 2px 10px rgba(10,61,145,.08); transform:translateY(-1px); }
.gauge-card .g-title { font-size:12px; color:var(--mute); margin-bottom:6px; font-weight:600; }
.gauge-card .g-title b { color:#1e293b; font-size:13px; }
.gauge-card svg.gauge { display:block; margin:0 auto; width:100%; max-width:200px; height:115px; }
.gauge-card .g-legend { display:flex; justify-content:space-around; margin-top:8px; font-size:11px; color:var(--mute); }
.gauge-card .g-legend b { color:#1e293b; font-size:13px; margin-left:3px; }

/* 主指标强调：彩色头带 + 大号 */
.gauge-card.is-primary { padding:0; overflow:hidden; }
.gauge-card.is-primary .g-head { padding:10px 16px; color:#fff; display:flex; align-items:center; gap:8px; text-align:left; }
.gauge-card.is-primary .g-head b { font-size:14px; font-weight:800; letter-spacing:.5px; }
.gauge-card.is-primary .g-head .g-pill { margin-left:auto; font-size:10px; padding:2px 8px; border-radius:10px; background:rgba(255,255,255,.22); font-weight:600; }
.gauge-card.is-primary .g-body { padding:14px 14px 14px; }
.gauge-card.is-primary .g-legend { padding-bottom:2px; }
.gauge-card.primary-a .g-head { background:linear-gradient(135deg,#1e40af,#3b82f6); }
.gauge-card.primary-b .g-head { background:linear-gradient(135deg,#072c6b,#0a3d91); }
.gauge-card.primary-a svg.gauge, .gauge-card.primary-b svg.gauge { max-width:230px; height:130px; }

/* 子分项：小卡 */
.gauge-card.is-sub { padding:10px 12px 10px; }
.gauge-card.is-sub .g-title { font-size:11px; margin-bottom:2px; }
.gauge-card.is-sub .g-title b { font-size:12px; }
.gauge-card.is-sub svg.gauge { max-width:160px; height:92px; }
.gauge-card.is-sub svg.gauge text[data-role="gauge-value"] { font-size:18px !important; }
.gauge-card.is-sub .g-legend { margin-top:4px; font-size:10px; gap:6px; }
.gauge-card.is-sub .g-legend b { font-size:11px; }

@media (max-width:900px) {
  .gauge-row-primary { grid-template-columns:1fr; }
  .gauge-row-sub { grid-template-columns:1fr; }
}

.drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.4); backdrop-filter:blur(2px); z-index:200; display:flex; justify-content:flex-end; }
.drawer { background:#fff; width:min(720px,100vw); height:100%; box-shadow:-4px 0 20px rgba(0,0,0,.18); overflow-y:auto; animation:drawerIn .25s ease-out; }
@keyframes drawerIn { from { transform:translateX(100%); } to { transform:translateX(0); } }
.drawer .dr-head { padding:18px 24px; border-bottom:1px solid var(--bord); display:flex; align-items:center; gap:12px; position:sticky; top:0; background:#fff; z-index:1; }
.drawer .dr-head h3 { flex:1; font-size:16px; font-weight:700; color:#1e293b; }
.drawer .dr-head .dr-sub { font-size:11px; color:var(--mute); font-weight:400; margin-left:8px; }
.drawer .dr-close { background:#f1f5f9; border:none; width:32px; height:32px; border-radius:16px; cursor:pointer; font-size:14px; color:var(--mute); }
.drawer .dr-close:hover { background:#e2e8f0; }
.drawer .dr-body { padding:20px 24px 40px; }
.drawer .dr-section { margin-bottom:24px; }
.drawer .dr-section h4 { font-size:13px; font-weight:700; color:#1e293b; margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--bord); }
.drawer .dr-kv { display:grid; grid-template-columns:110px 1fr; gap:8px 14px; font-size:13px; }
.drawer .dr-kv dt { color:var(--mute); }
.drawer .dr-kv dd { color:#1e293b; font-weight:600; }
.drawer table { font-size:12px; }

.fill-status { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:14px; font-size:12px; font-weight:600; cursor:pointer; border:1px dashed transparent; transition:transform .15s; }
.fill-status:hover { transform:scale(1.03); }
.fill-status.pending { background:#fef3c7; color:#92400e; border-color:#d97706; }
.fill-status.done-100 { background:#dcfce7; color:#15803d; }
.fill-status.done-70 { background:#ffedd5; color:#c2410c; }
.fill-status.done-0 { background:#fee2e2; color:#b91c1c; }
.fill-status.done--1 { background:#f1f5f9; color:#64748b; }

.score-summary { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-top:10px; padding:9px 14px; background:#f8fafc; border:1px solid var(--bord); border-radius:7px; font-size:12px; }
.score-summary .sm-score { font-weight:800; font-size:16px; }
.score-summary .sm-score.s-100 { color:var(--ok); }
.score-summary .sm-score.s-70 { color:var(--warn); }
.score-summary .sm-score.s-0 { color:var(--err); }
.score-summary .sm-score.s--1 { color:#6b7280; }
.score-summary .sm-coef { color:var(--mute); font-size:11px; }
.score-summary .sm-weighted { color:var(--brand); font-weight:700; }
.score-summary .sm-note { flex:1; min-width:150px; color:#475569; font-size:11px; border-left:2px solid var(--bord); padding-left:10px; }
.score-summary .sm-attach { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; background:#eff6ff; color:#2563eb; border-radius:10px; font-size:11px; }
.score-summary .sm-edit { padding:4px 12px; border-radius:5px; background:#fff; border:1px solid var(--bord); color:var(--mute); font-size:11px; cursor:pointer; }
.score-summary .sm-edit:hover { border-color:var(--brand); color:var(--brand); }

.fill-modal { max-width:640px; }
.fill-modal .fm-head { padding-bottom:12px; border-bottom:1px solid var(--bord); margin-bottom:14px; }
.fill-modal .fm-title { font-size:16px; font-weight:700; color:#1e293b; }
.fill-modal .fm-sub { font-size:12px; color:var(--mute); margin-top:4px; }
.fill-modal .fm-section { margin-top:16px; }
.fill-modal .fm-section > label { display:block; font-size:12px; font-weight:600; color:#1e293b; margin-bottom:8px; }

.score-radio-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.score-radio { padding:10px 14px; border:2px solid var(--bord); border-radius:8px; cursor:pointer; transition:all .15s; background:#fff; }
.score-radio:hover { border-color:var(--mute); }
.score-radio.sel-100 { border-color:var(--ok); background:#f0fdf4; }
.score-radio.sel-70 { border-color:var(--warn); background:#fff7ed; }
.score-radio.sel-0 { border-color:var(--err); background:#fef2f2; }
.score-radio.sel--1 { border-color:#6b7280; background:#f9fafb; }
.score-radio .sr-head { display:flex; align-items:center; gap:8px; font-weight:700; font-size:13px; color:#1e293b; }
.score-radio .sr-badge { padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; color:#fff; }
.score-radio .sr-badge.b-100 { background:var(--ok); }
.score-radio .sr-badge.b-70 { background:var(--warn); }
.score-radio .sr-badge.b-0 { background:var(--err); }
.score-radio .sr-badge.b--1 { background:#6b7280; }
.score-radio .sr-desc { font-size:11px; color:var(--mute); margin-top:4px; }

.file-drop { border:2px dashed var(--bord); border-radius:8px; padding:16px; text-align:center; cursor:pointer; transition:border-color .2s,background .2s; background:#fafbfc; }
.file-drop:hover { border-color:var(--brand); background:#f0f9ff; }
.file-drop .fd-plus { font-size:22px; color:var(--brand); font-weight:300; line-height:1; }
.file-drop .fd-hint { font-size:12px; color:var(--mute); margin-top:4px; line-height:1.6; }
.file-drop .fd-hint b { color:#1e293b; }

.file-list { list-style:none; padding:0; margin-top:10px; }
.file-list li { display:flex; align-items:center; gap:10px; padding:8px 12px; background:#f8fafc; border:1px solid var(--bord); border-radius:6px; margin-bottom:6px; font-size:12px; }
.file-list .fl-icon { color:var(--brand); font-size:14px; }
.file-list .fl-name { flex:1; color:#1e293b; font-weight:500; word-break:break-all; }
.file-list .fl-size { color:var(--mute); font-size:11px; flex:0 0 auto; }
.file-list .fl-del { background:#fff; color:var(--err); border:1px solid #fee2e2; padding:3px 10px; border-radius:4px; font-size:11px; cursor:pointer; }
.file-list .fl-del:hover { background:#fef2f2; }

.backend-notice { padding:8px 12px; background:#fffbeb; border:1px solid #fde68a; border-radius:6px; font-size:11px; color:#92400e; line-height:1.6; margin-top:10px; }

.dim-a-group { background:#fff; border-radius:10px; margin-bottom:16px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.04); }
.dim-a-group .dag-head { padding:14px 20px; display:flex; align-items:center; gap:10px; }
.dim-a-group.kao .dag-head { background:linear-gradient(135deg,#eff6ff,#dbeafe); border-left:5px solid var(--brand); }
.dim-a-group.guan .dag-head { background:linear-gradient(135deg,#f1f5f9,#e2e8f0); border-left:5px solid var(--mute); }
.dim-a-group .dag-tag { padding:3px 10px; border-radius:10px; font-size:11px; font-weight:700; color:#fff; }
.dim-a-group.kao .dag-tag { background:var(--brand); }
.dim-a-group.guan .dag-tag { background:var(--mute); }
.dim-a-group .dag-title { flex:1; font-size:14px; font-weight:700; color:#1e293b; }
.dim-a-group .dag-count { font-size:11px; color:var(--mute); font-weight:500; }
.dim-a-group .dag-body { padding:14px 20px; }

.dm-card { display:grid; grid-template-columns:42px 1fr 200px 140px 90px; gap:14px; align-items:center; padding:12px 14px; border:1px solid var(--bord); border-left:4px solid var(--brand); border-radius:8px; margin-bottom:8px; background:linear-gradient(to right,#fff,#f8fafc); transition:box-shadow .2s; }
.dm-card:hover { box-shadow:0 2px 8px rgba(0,0,0,.06); }
.dm-card.reverse { border-left-color:var(--warn); }
.dm-card .dm-ico { width:42px; height:42px; border-radius:10px; background:#eff6ff; color:var(--brand); display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:800; }
.dm-card.reverse .dm-ico { background:#fff7ed; color:var(--warn); }
.dm-card .dm-main { min-width:0; }
.dm-card .dm-name { font-size:13px; font-weight:700; color:#1e293b; display:flex; align-items:center; gap:6px; }
.dm-card .dm-note { font-size:11px; color:var(--mute); margin-top:3px; line-height:1.5; }
.dm-card .dm-target { text-align:right; }
.dm-card .dm-target label { font-size:11px; color:var(--mute); display:block; margin-bottom:2px; }
.dm-card .dm-target b { font-size:15px; font-weight:800; color:#1e293b; }
.dm-card .dm-target small { font-size:11px; color:var(--mute); margin-left:3px; font-weight:500; }
.dm-card .dm-actual label { font-size:11px; color:var(--mute); display:block; margin-bottom:3px; }
.dm-card .dm-actual input { width:100%; padding:6px 8px; border:1px solid var(--bord); border-radius:5px; font-size:13px; text-align:right; font-weight:600; color:var(--brand); }
.dm-card .dm-actual input:focus { border-color:var(--brand); outline:none; box-shadow:0 0 0 2px rgba(10,61,145,.1); }
.dm-card .dm-rate { font-size:16px; font-weight:800; text-align:center; padding:6px 8px; border-radius:6px; }
.dm-card .dm-rate.r-ok { background:#f0fdf4; color:var(--ok); }
.dm-card .dm-rate.r-warn { background:#fff7ed; color:var(--warn); }
.dm-card .dm-rate.r-err { background:#fef2f2; color:var(--err); }
.dm-card .dm-rate.r-none { background:#f1f5f9; color:#94a3b8; font-size:13px; }

@media (max-width:900px) {
  .dm-card { grid-template-columns:36px 1fr; grid-template-rows:auto auto; }
  .dm-card .dm-target, .dm-card .dm-actual, .dm-card .dm-rate { grid-column:span 2; text-align:left; }
}

.item .milestone button.btn-ghost { padding:2px 10px; }
</style>
</head>

// ===== 云端细粒度 API（每个操作独立写入对应数据行，互不覆盖）=====
const API = {
  // ── 认证 ──
  async login(u, p, remember) {
    const r = await fetch("/api/login", {
      method: "POST", credentials: "same-origin",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({u, p, remember}),
    });
    const d = await r.json().catch(()=>({}));
    if (!r.ok) throw new Error(d.error || "登录失败");
    return d;
  },
  async logout() {
    await fetch("/api/logout", {method: "POST", credentials: "same-origin"});
  },

  // ── 全量读取（页面加载 / 轮询刷新）──
  async fetchState() {
    const r = await fetch("/api/state", {credentials: "same-origin"});
    if (!r.ok) throw new Error("加载状态失败");
    return r.json();
  },

  // ── 核心攻坚项 ──
  async setOppScore(opp_idx, month, score) {
    return _apiPost("/api/opp_fill/score", {opp_idx, month, score});
  },
  async saveOppFill(opp_idx, month, score, note, files) {
    return _apiPost("/api/opp_fill", {opp_idx, month, score, note, files});
  },
  async deleteOppFill(opp_idx, month) {
    return _apiReq("DELETE", "/api/opp_fill", {opp_idx, month});
  },
  async saveOppMilestone(opp_idx, month, text) {
    return _apiPost("/api/opp_milestone", {opp_idx, month, text});
  },

  // ── 专项任务项 ──
  async setTaskScore(task_idx, month, score) {
    return _apiPost("/api/task_fill/score", {task_idx, month, score});
  },
  async saveTaskFill(task_idx, month, score, note, files) {
    return _apiPost("/api/task_fill", {task_idx, month, score, note, files});
  },
  async deleteTaskFill(task_idx, month) {
    return _apiReq("DELETE", "/api/task_fill", {task_idx, month});
  },
  async saveTaskMilestone(task_idx, month, text) {
    return _apiPost("/api/task_milestone", {task_idx, month, text});
  },

  // ── 维度 A 实际值 ──
  async setDimA(month, metric_name, value) {
    return _apiPost("/api/dim_a_actual", {month, metric_name, value});
  },

  // ── 重置全公司数据（GM 专用）──
  async reset() {
    return _apiPost("/api/reset", {});
  },
};

// 辅助：统一 fetch + 错误处理
async function _apiPost(url, body) {
  return _apiReq("POST", url, body);
}
async function _apiReq(method, url, body) {
  const r = await fetch(url, {
    method, credentials: "same-origin",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    const d = await r.json().catch(()=>({}));
    throw new Error(d.error || `${url} 失败 HTTP ${r.status}`);
  }
  return r.json().catch(()=>({}));
}

// 通用错误提示（优先用页面 toast，回退到 console.error）
function _apiError(label, e) {
  console.error(`[${label}]`, e);
  if (typeof toast === "function") toast(`${label}：${e.message||e}`, "warn");
}

function _readSession() {
  // 由后端在 HTML 顶部注入 window.__SESSION__
  return window.__SESSION__ || null;
}

      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#475569;margin-bottom:16px;cursor:pointer;">

    const p = document.getElementById("_il_p").value;

      err.textContent = "账号或密码错误";
      err.style.display = "block";
      return;

    const remember = document.getElementById("_il_remember").checked;

      role:acc.role, scope:acc.scope, canEditDimA:acc.canEditDimA,

// 覆盖 doLogin：通过云端 API 校验，HttpOnly Cookie 由后端下发
function _bindCloudLogin() {
  const sub = document.getElementById("_il_submit");
  if (!sub) return;
  const handler = async () => {
    const u = document.getElementById("_il_u").value.trim();
    const p = document.getElementById("_il_p").value;
    const remember = document.getElementById("_il_remember").checked;
    const err = document.getElementById("_il_err");
    err.style.display = "none";
    sub.disabled = true; sub.textContent = "登录中...";
    try {
      await API.login(u, p, remember);
      location.reload();
    } catch (e) {
      err.textContent = e.message || "登录失败";
      err.style.display = "block";
      sub.disabled = false; sub.textContent = "登 录";
    }
  };
  sub.onclick = handler;

function normalizeDeptToken(tk) {
  if (tk === '经营部' || tk === '经管部') return '经营管理部';
  if (tk === '研发部' || tk === '交付部') return '研发交付部';

function deptMatch(fieldText, dept) {
  // 字段样式：'销售部-1' / '销售部-2' / '销售部'（公司级任务，销售部-1 和 -2 都应看到）
  //           '研发交付部' / '研发交付部/综合部' / '销售部+经营管理部'
  const raw = (fieldText||"").replace(/\s/g,"");
  if (!raw) return false;
  const tokens = raw.split(/[\/、+，,]/).filter(Boolean).map(normalizeDeptToken);
  // 销售部-1 / 销售部-2 额外继承"销售部"公共任务；其它部门只精确匹配自己
  const isSalesSub = dept === '销售部-1' || dept === '销售部-2';
  return tokens.some(tk => tk === dept || (isSalesSub && tk === '销售部'));
}

function collectItems(dept, month) {
  const core = [];
  const special = [];
  const dupShow = [];
  DATA.opps.forEach((o, i) => {
    if (!deptMatch(o.主责部门, dept)) return;
    const ms = o.里程碑 || {};
    const monthMs = ms[month];
    if (!monthMs) return;
    core.push({ idx:i, opp:o, milestone:monthMs });
  });
  DATA.tasks.forEach((t, i) => {
    if (!deptMatch(t.部门, dept)) return;
    if (normMonth(t.月份) !== month) return;
    if (DUP_IDX.has(i)) {
      dupShow.push({ idx:i, task:t });
      return;
    }
    const ms = t.里程碑 || {};
    const monthMs = ms[month] || {};
    special.push({ idx:i, task:t, milestone:monthMs });
  });
  return { core, special, dupShow };
}

function computeDimB(dept, month) {
  const { core, special } = collectItems(dept, month);
  let cNum=0, cDen=0;
  core.forEach(({idx, opp}) => {
    const sc = getItemScore("core", idx, month);
    if (sc == null || sc === -1) return;
    const coef = opp.系数 || 1.2;
    cNum += sc * coef; cDen += 100 * coef;
  });
  const coreScore = cDen ? cNum/cDen*100 : null;
  let sNum=0, sDen=0;
  special.forEach(({idx, task}) => {
    const sc = getItemScore("special", idx, month);
    if (sc == null || sc === -1) return;
    const coef = task.系数 || 1.0;
    sNum += sc * coef; sDen += 100 * coef;
  });
  const specialScore = sDen ? sNum/sDen*100 : null;
  let dimB;
  if (coreScore !== null && specialScore !== null) dimB = coreScore*0.5 + specialScore*0.5;
  else if (coreScore !== null) dimB = coreScore;
  else if (specialScore !== null) dimB = specialScore;
  else dimB = null;
  return { coreScore, specialScore, dimB, core, special };
}

function computeDimBCumulative(dept) {
  const months = MONTHS;
  let coreNum=0, coreDen=0, spNum=0, spDen=0;
  let coreCnt=0, spCnt=0;
  months.forEach(m => {

    coreCnt += core.length; spCnt += special.length;
    core.forEach(({idx, opp}) => {
      const sc = getItemScore("core", idx, m);
      if (sc == null || sc === -1) return;
      const coef = opp.系数 || 1.2;
      coreNum += sc*coef; coreDen += 100*coef;
    });
    special.forEach(({idx, task}) => {
      const sc = getItemScore("special", idx, m);
      if (sc == null || sc === -1) return;
      const coef = task.系数 || 1.0;
      spNum += sc*coef; spDen += 100*coef;
    });
  });
  const coreScore = coreDen ? coreNum/coreDen*100 : null;
  const spScore = spDen ? spNum/spDen*100 : null;
  let dimB;
  if (coreScore !== null && spScore !== null) dimB = coreScore*0.5 + spScore*0.5;
  else if (coreScore !== null) dimB = coreScore;
  else if (spScore !== null) dimB = spScore;
  else dimB = null;
  return { coreScore, spScore, dimB, coreCnt, spCnt };

function renderGaugeSVG(val, label, colorVar) {
  const w=200, h=115, cx=100, cy=100, r=80;
  const v = val==null ? 0 : Math.max(0, Math.min(120, val));
  const maxV = 120;
  const startA = Math.PI, endA = 2*Math.PI;
  const angle = startA + (endA - startA) * (v / maxV);
  const ex = cx + r*Math.cos(angle), ey = cy + r*Math.sin(angle);
  const bgArc = `M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`;
  const fgArc = val==null ? "" : `M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${ex} ${ey}`;
  const labelColor = val==null ? '#cbd5e1' : `var(${colorVar})`;
  const ticks = [0,30,60,90,120].map(t => {
    const a = startA + (endA-startA)*(t/maxV);
    const x1 = cx + (r-5)*Math.cos(a), y1 = cy + (r-5)*Math.sin(a);
    const x2 = cx + (r+4)*Math.cos(a), y2 = cy + (r+4)*Math.sin(a);
    const tx = cx + (r+14)*Math.cos(a), ty = cy + (r+14)*Math.sin(a);
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#cbd5e1" stroke-width="1"/>
            <text x="${tx}" y="${ty}" font-size="9" fill="#94a3b8" text-anchor="middle" dominant-baseline="middle">${t}</text>`;
  }).join("");
  return `<svg class="gauge" viewBox="0 0 ${w} ${h}">
    <path d="${bgArc}" stroke="#eef1f5" stroke-width="14" fill="none" stroke-linecap="round"/>
    ${fgArc?`<path d="${fgArc}" stroke="var(${colorVar})" stroke-width="14" fill="none" stroke-linecap="round"/>`:""}
    ${ticks}
    <text data-role="gauge-value" x="${cx}" y="${cy-18}" text-anchor="middle" font-size="22" font-weight="800" fill="${labelColor}">${label}</text>
  </svg>`;
}

function renderTrendSVG() {
  // GM → 5部门均值走势；非GM → 本部门走势（销售部合并销售部-1/-2）
  const targetDepts = IS_GM ? DEPTS : (SESS_SCOPE === "销售部" ? ["销售部-1","销售部-2"] : [SESS_SCOPE]);
  const pts = MONTHS.map(m => {
    const arr = targetDepts.map(d => computeDimB(d,m).dimB).filter(x=>x!=null);
    return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
  });
  const w=800, h=160, pad=30;
  const maxV=120;
  const step = (w-2*pad)/(MONTHS.length-1);
  let path="", dots="";
  pts.forEach((v,i) => {
    const x = pad + i*step;
    const y = h - pad - (v||0)/maxV*(h-2*pad);
    path += (i?"L":"M") + x + "," + y + " ";
    dots += `<circle cx="${x}" cy="${y}" r="4" fill="var(--brand)"/>
             <text x="${x}" y="${h-8}" text-anchor="middle" font-size="11" fill="#64748b">${MONTHS[i]}</text>
             <text x="${x}" y="${y-10}" text-anchor="middle" font-size="11" font-weight="700" fill="var(--brand)">${v==null?"—":v.toFixed(1)}</text>`;
  });
  const grid = [0,30,60,90,120].map(v => {
    const y = h - pad - v/maxV*(h-2*pad);
    return `<line x1="${pad}" y1="${y}" x2="${w-pad}" y2="${y}" stroke="#eef1f5"/>
            <text x="${pad-6}" y="${y+3}" text-anchor="end" font-size="10" fill="#94a3b8">${v}</text>`;
  }).join("");
  return `<svg class="trend-svg" viewBox="0 0 ${w} ${h}">${grid}
    <path d="${path}" stroke="var(--brand)" stroke-width="2.5" fill="none"/>
    ${dots}
  </svg>`;
}

      return `<button class="${state.typeFilter===k?'active':''}" onclick="window.setTypeFilter('${k}')">${TYPE_LABELS[k]} ${cnt}</button>`;
    }).join("")}
  </div>`;

  let html = `<div class="legend">
    <b>核心攻坚项</b>（${DATA.opps.length} 条）= 原商机跟进表 <b>全部 50 条保留</b> · 年度级、关乎业务实际推进和商机兑现的最重要工作 · 系数 <b>1.2</b> · 计入维度B 50%。
    <br>既含具体客户签约（签约指向型），也含为签约护航的能力建设事项（产品/平台/人才/生态/渠道/品牌/集团协同/政府共建等）。
    <br>评分按<b>本月里程碑达成度</b>：<span class="badge" style="background:#f0fdf4;color:var(--ok)">按时完成 100</span>
    <span class="badge" style="background:#fff7ed;color:var(--warn)">延期≤5天 70</span>
    <span class="badge" style="background:#fef2f2;color:var(--err)">延期>5天或未完成 0</span>
    <span class="badge" style="background:#f9fafb;color:#6b7280">客观取消 不计</span>
  </div>`;
  html += typeButtons;

  deptList.forEach(dept => {
    let { core } = collectItems(dept, m);
    if (state.typeFilter !== "all") {
      core = core.filter(x => x.opp.opp_type === state.typeFilter);
    }
    const r = computeDimB(dept, m);
    html += `<div class="card"><h2>
      <span class="tag accent">核心攻坚项 50%</span>${dept} · ${m}
      <small>本月得分 ${fmtScore(r.coreScore)} · ${state.typeFilter==='all'?'共':'筛选后'} ${core.length} 条</small>
    </h2>`;
    if (!core.length) {
      html += `<div style="font-size:12px;color:var(--mute);padding:12px;text-align:center">${state.typeFilter==='all'?'本月本部门无核心攻坚项':'当前筛选无匹配条目'}</div>`;
    } else {
      core.forEach(({idx, opp, milestone}) => {
        html += renderItemCard("core", idx, opp.客户, [
          `<span class="type-pill type-${opp.opp_type}">${TYPE_LABELS[opp.opp_type]}</span>`,
          `业务线：${opp.业务线}`,
          `阶段：${opp.阶段||"-"}`,
          `预估金额：${opp.预估金额||"-"}`,
          opp.预计签约月 ? `预计签约月：${opp.预计签约月}` : "",
          opp.归类说明 ? `归类：${opp.归类说明}` : "",
        ].filter(Boolean), milestone, 1.2, "core");
      });
    }
    html += `</div>`;
  });
  el.innerHTML = html;
}

window.openMetricDrawer = function(nameEnc) {
  const name = decodeURIComponent(nameEnc);
  const metric = [...DATA.dim_a_metrics, ...DATA.dim_a_plus_task_metrics].find(x => x.名称 === name);
  if (!metric) return;
  const target = parseFloat(metric.目标值) || null;
  const reverse = name.includes("费用") || name.includes("成本");
  const rows = YEAR_MONTHS.map(mo => {
    const actual = getDimAActual(name, mo);
    let ratio = null;
    if (target && actual != null) ratio = reverse ? target/Math.max(actual,0.01) : actual/target;
    const rp = ratio == null ? "—" : (Math.min(ratio,1.2)*100).toFixed(1)+"%";
    const color = ratio==null ? "#94a3b8" : ratio>=1 ? "var(--ok)" : ratio>=0.8 ? "var(--warn)" : "var(--err)";
    return `<tr>
      <td style="font-weight:600">${mo}</td>
      <td>${actual==null?'<span style="color:#cbd5e1">未填报</span>':fmtNum(actual)}</td>
      <td style="color:${color};font-weight:700">${rp}</td>
    </tr>`;
  }).join("");
  const cum = getDimAActualCumulative(name);
  let cumRatio = null;
  if (target && cum != null) cumRatio = reverse ? target/Math.max(cum,0.01) : cum/target;

  const host = document.getElementById("modalHost");
  host.innerHTML = `<div class="drawer-mask" onclick="window.closeDrawer(event)">
    <div class="drawer" onclick="event.stopPropagation()">
      <div class="dr-head">
        <h3>${escapeHtml(name)}<span class="dr-sub">${metric.类别} · ${metric.类型}指标</span></h3>
        <button class="dr-close" onclick="window.closeDrawer()">✕</button>
      </div>
      <div class="dr-body">
        <div class="dr-section">
          <h4>指标概览</h4>
          <dl class="dr-kv">
            <dt>单位</dt><dd>${metric.单位||"—"}</dd>
            <dt>年度目标</dt><dd>${fmtNum(metric.目标值)} ${metric.单位||""}</dd>
            <dt>方向</dt><dd>${reverse?'<span class="badge badge-B">逆向（越低越好）</span>':"正向（越高越好）"}</dd>
            <dt>2026 累计</dt><dd>${cum==null?'<span style="color:#cbd5e1">未填报</span>':fmtNum(cum)+" "+(metric.单位||"")} · 完成率 <b style="color:${cumRatio==null?'#94a3b8':cumRatio>=1?'var(--ok)':cumRatio>=0.8?'var(--warn)':'var(--err)'}">${cumRatio==null?'—':(Math.min(cumRatio,1.2)*100).toFixed(1)+'%'}</b></dd>
            ${metric.备注?`<dt>口径说明</dt><dd style="font-weight:400;color:#475569">${escapeHtml(metric.备注)}</dd>`:""}
          </dl>
        </div>
        <div class="dr-section">
          <h4>2026 年度月度填报明细</h4>
          <table class="tbl-ct tbl-striped">
            <thead><tr><th>月份</th><th>当月实际</th><th>完成率</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div style="font-size:11px;color:var(--mute);margin-top:10px;line-height:1.7">
            💡 月度实际值由总经理 / 经营管理部在【维度A · 业绩指标】tab 内填报，其它部门仅查看。<br>
            ${reverse?'逆向指标：实际值越低完成率越高，完成率 = 目标值/实际值。':'正向指标：实际值越高完成率越高，完成率 = 实际值/目标值。'}
          </div>
        </div>
      </div>
    </div>
  </div>`;
};

function renderSpecial() {
  const el = document.getElementById("view_special");
  const m = state.month;
  const isGM = IS_GM;
  const deptList = isGM ? DEPTS : (SESS_SCOPE === "销售部" ? ["销售部-1","销售部-2"] : [SESS_SCOPE]);

  let html = `<div class="legend">
    <b>专项任务项</b>（${DATA.tasks.length - DATA.dup_task_idx.length} 条）= 1-6月任务清单去重后剩余条目 · 沿用原等级 A/B/C · 系数 1.2/1.0/0.8 · 计入维度B 50%。
    <br>评分按<b>本月里程碑达成度</b>，与核心攻坚项完全一致（4 档 100/70/0/不计）。
    <br>与核心攻坚项中签约指向型重合的 ${DATA.dup_task_idx.length} 条，仅在核心攻坚项计分，此处以 <span class="badge badge-dup">已在核心攻坚项计分</span> 标注。
  </div>`;

  deptList.forEach(dept => {
    const { special, dupShow } = collectItems(dept, m);
    const r = computeDimB(dept, m);
    html += `<div class="card"><h2>
      <span class="tag">专项任务项 50%</span>${dept} · ${m}
      <small>本月得分 ${fmtScore(r.specialScore)} · ${special.length} 条</small>
    </h2>`;

    if (special.length) {
      special.forEach(({idx, task, milestone}) => {
        const grade = task.等级 || "B";
        const coef = task.系数 || 1.0;
        html += renderItemCard("special", idx, task.描述, [
          `<span class="badge badge-${grade}">${grade} 级</span>`,
          `业务线：${task.业务线||""}`,
          `期望完成：${task.期望完成||"-"}`,
          `完成情况：${task.完成情况||"-"}`,
        ], milestone, coef, "special", grade);
      });
    }

    if (dupShow.length) {
      html += `<h3 style="font-size:13px;margin:16px 0 8px;color:#92400e">⚠️ 已在核心攻坚项计分（${dupShow.length} 条 · 展示不计分）</h3>
        <table class="tbl-striped"><thead><tr>
          <th>#</th><th>任务描述</th><th>业务线</th><th>原等级</th><th>匹配核心攻坚项</th>
        </tr></thead><tbody>`;
      dupShow.forEach(({idx,task}) => {
        const d = DATA.duplicates.find(d=>d.task_idx===idx);
        html += `<tr>
          <td>${task.序号}</td>
          <td>${task.描述}</td>
          <td>${task.业务线||""}</td>
          <td><span class="badge badge-${task.原等级}">${task.原等级}</span></td>
          <td>${d?`<span class="badge badge-dup">匹配 ${d.matched}</span>`:""}</td>
        </tr>`;
      });
      html += `</tbody></table>`;
    }

    if (!special.length && !dupShow.length) {
      html += `<div style="font-size:12px;color:var(--mute);padding:12px;text-align:center">本月本部门无专项任务项</div>`;
    }
    html += `</div>`;
  });
  el.innerHTML = html;
}

function renderItemCard(kind, idx, name, metaLines, milestone, coef, cls, grade) {
  const m = state.month;
  const score = getItemScore(kind, idx, m);
  const coefTag = grade ? `${grade} ×${coef}` : `×${coef}`;
  const coefBadge = cls==="core" ? "badge-core" : "badge-special";

  // 状态徽章
  let statusBtn;
  if (score == null) {
    statusBtn = `<button class="fill-status pending" onclick="window.openFillModal('${kind}',${idx},'${m}')">📝 未填报 · 点击填报</button>`;
  } else {
    const scoreLabel = score === -1 ? "不计" : `${score} 分`;
    statusBtn = `<button class="fill-status done-${score}" onclick="window.openFillModal('${kind}',${idx},'${m}')">✓ ${scoreLabel}</button>`;
  }

  // 得分摘要
  let summary = "";
  if (score != null) {
    const effective = score === -1 ? null : score;
    const weighted = effective == null ? "—" : (effective * coef).toFixed(1);
    const files = getFillFiles(kind, idx, m);
    const note = getFillNote(kind, idx, m);
    summary = `<div class="score-summary">
      <div>得分 <span class="sm-score s-${score}">${score===-1?"不计":score}</span></div>
      <div class="sm-coef">× 系数 ${coef}${grade?` (${grade}级)`:""}</div>
      <div>= 加权 <span class="sm-weighted">${weighted}</span></div>
      ${files.length?`<span class="sm-attach">📎 ${files.length} 个附件</span>`:""}
      ${note?`<div class="sm-note">${escapeHtml(note)}</div>`:""}
      <button class="sm-edit" onclick="window.openFillModal('${kind}',${idx},'${m}')">编辑</button>
    </div>`;
  }

  // 核心攻坚项显示本月里程碑块（已锁定，统一按表定版，不再逐条编辑）；专项任务项按月任务已固定，不显示
  const milestoneBlock = cls === "core" ? `<div class="milestone">
      <b>${m} 本月里程碑</b>：${milestone.目标 || "（待补充）"}
    </div>` : "";

  return `<div class="item ${cls}">
    <div class="i-head">
      <span class="badge ${coefBadge}">${coefTag}</span>
      <div class="i-name">${name}</div>
      ${statusBtn}
    </div>
    <div class="i-meta">${metaLines.map(x=>`<span>${x}</span>`).join("")}</div>
    ${milestoneBlock}
    ${summary}
  </div>`;
}

window.setScore = function(kind, idx, month, score) {
  setItemScore(kind, idx, month, score);
  render();
};

// ===== 填报弹窗（评分 + 附件 + 备注 一体化） =====
const MAX_FILE_SIZE = 50 * 1024 * 1024;
let fillDraft = null;

function _buildFillCtx() {
  const obj = fillDraft.kind === "core" ? DATA.opps[fillDraft.idx] : DATA.tasks[fillDraft.idx];
  const name = fillDraft.kind === "core" ? obj.客户 : obj.描述;
  const meta = fillDraft.kind === "core"
    ? `${obj.业务线||""} · ${TYPE_LABELS[obj.opp_type]||""} · ${obj.主责部门||""}`
    : `${obj.业务线||""} · ${obj.等级||"B"}级 · ${obj.部门||""}`;
  // 专项任务项不展示里程碑（按月固定）
  const ms = fillDraft.kind === "core"
    ? ((obj.里程碑 && obj.里程碑[fillDraft.month] && obj.里程碑[fillDraft.month].目标) || "（待补充）")
    : null;
  return { name, meta, milestone: ms };
}

window.openFillModal = function(kind, idx, month) {
  fillDraft = {
    kind, idx, month,
    score: getItemScore(kind, idx, month),
    files: getFillFiles(kind, idx, month).slice(),
    note: getFillNote(kind, idx, month),
  };
  renderFillModal();
};

function renderFillModal() {
  const host = document.getElementById("modalHost");
  const d = fillDraft;
  const ctx = _buildFillCtx();

  const scoreRadios = SCORE_OPTS.map(o => {
    const sel = d.score === o.v ? `sel-${o.v}` : "";
    const label = o.v === -1 ? "不计入" : `${o.v} 分`;
    return `<div class="score-radio ${sel}" onclick="window.fillSetScore(${o.v})">
      <div class="sr-head">
        <span class="sr-badge b-${o.v}">${o.v===-1?'—':o.v}</span>
        ${label}
      </div>
      <div class="sr-desc">${o.label}</div>
    </div>`;
  }).join("");

  const fileList = d.files.length ? `<ul class="file-list">
    ${d.files.map((f,i) => `<li>
      <span class="fl-icon">📎</span>
      <span class="fl-name">${escapeHtml(f.name)}</span>
      <span class="fl-size">${fmtFileSize(f.size)}</span>
      <button class="fl-del" onclick="window.fillRemoveFile(${i})">删除</button>
    </li>`).join("")}
  </ul>` : "";

  const milestoneBar = ctx.milestone
    ? `<div style="margin-top:8px;padding:8px 12px;background:#f8fafc;border-radius:6px;font-size:12px">
         <b style="color:var(--brand-dark)">${d.month} 里程碑：</b>${escapeHtml(ctx.milestone)}
       </div>`
    : `<div style="margin-top:8px;padding:8px 12px;background:#f8fafc;border-radius:6px;font-size:12px;color:var(--mute)">
         专项任务项按月任务描述固定，无单列里程碑。评分按任务完成度判分。
       </div>`;

  host.innerHTML = `<div class="mask" onclick="window.closeFillModal(event)">
    <div class="box fill-modal" onclick="event.stopPropagation()">
      <div class="fm-head">
        <div class="fm-title">📝 ${d.kind==="core"?"里程碑":"任务完成度"}填报</div>
        <div class="fm-sub">${escapeHtml(ctx.name)} · ${escapeHtml(ctx.meta)}</div>
        ${milestoneBar}
      </div>

      <div class="fm-section">
        <label>① ${d.kind==="core"?"本月里程碑达成度":"本月任务完成度"}评分</label>
        <div class="score-radio-grid">${scoreRadios}</div>
      </div>

      <div class="fm-section">
        <label>② 情况说明 / 延期原因（可选，不超过 500 字）</label>
        <textarea id="fillNote" rows="3" maxlength="500" placeholder="例：已完成方案递交并回复客户意见，等待下周商务会谈。">${escapeHtml(d.note)}</textarea>
      </div>

      <div class="fm-section">
        <label>③ 附件上传（支持任意格式，单文件 ≤ 50MB）</label>
        <div class="file-drop" onclick="document.getElementById('fillFileInput').click()">
          <div class="fd-plus">+</div>
          <div class="fd-hint">点击选择文件，或拖拽到此处<br><b>支持任意格式，单文件上限 50MB</b></div>
        </div>
        <input type="file" id="fillFileInput" multiple style="display:none" onchange="window.fillAddFiles(event)">
        ${fileList}
        <div class="backend-notice">
          ⓘ 当前为演示环境，仅登记附件名称/大小/修改时间。<b>实际文件存储需后端对接后生效</b>，请同步将文件归档至部门共享盘或系统指定路径。
        </div>
      </div>

      <div class="actions">
        ${d.score!=null?`<button class="btn-ghost" style="margin-right:auto;color:var(--err);border-color:#fee2e2" onclick="window.fillClear()">清除填报</button>`:""}
        <button class="btn-ghost" onclick="window.closeFillModal()">取消</button>
        <button class="btn-primary" onclick="window.fillSave()">保存</button>
      </div>
    </div>
  </div>`;

  // 拖拽
  const drop = host.querySelector(".file-drop");
  if (drop) {
    drop.addEventListener("dragover", e => { e.preventDefault(); drop.style.borderColor = "var(--brand)"; drop.style.background = "#f0f9ff"; });
    drop.addEventListener("dragleave", () => { drop.style.borderColor = ""; drop.style.background = ""; });
    drop.addEventListener("drop", e => {
      e.preventDefault();
      drop.style.borderColor = ""; drop.style.background = "";
      window.fillAddFiles({ target:{ files:e.dataTransfer.files } });
    });
  }
}

function _syncNoteFromDOM() {
  const el = document.getElementById("fillNote");
  if (el) fillDraft.note = el.value;
}

window.fillSetScore = function(v) {
  _syncNoteFromDOM();
  fillDraft.score = v;
  renderFillModal();
};

window.fillAddFiles = function(ev) {
  _syncNoteFromDOM();
  const files = Array.from(ev.target.files || []);
  let skipped = 0;
  files.forEach(f => {
    if (f.size > MAX_FILE_SIZE) { skipped++; return; }
    fillDraft.files.push({ name:f.name, size:f.size, mtime:f.lastModified });
  });
  if (skipped) alert(`有 ${skipped} 个文件超过 50MB 限制已被跳过。`);
  renderFillModal();
};

window.fillRemoveFile = function(i) {
  _syncNoteFromDOM();
  fillDraft.files.splice(i, 1);
  renderFillModal();
};

window.fillClear = async function() {
  if (!confirm("确定清除本月填报？（评分、备注、附件全部清空）")) return;
  const { kind, idx, month } = fillDraft;
  const store = kind === "core" ? state.oppFill : state.taskFill;
  if (store[idx] && store[idx].months) delete store[idx].months[month];
  fillDraft = null;
  document.getElementById("modalHost").innerHTML = "";
  render();
  try {
    if (kind === "core") await API.deleteOppFill(idx, month);
    else                  await API.deleteTaskFill(idx, month);
  } catch(e) { _apiError("清除填报失败", e); }
};

window.fillSave = async function() {
  _syncNoteFromDOM();
  if (fillDraft.score == null) {
    alert("请先选择评分（100/70/0/不计）后再保存。");
    return;
  }
  const { kind, idx, month, score, note, files } = fillDraft;
  // 立即更新本地 state
  const store = kind === "core" ? state.oppFill : state.taskFill;
  const rec = store[idx] = store[idx] || { months:{}, milestones:{} };
  rec.months = rec.months || {};
  rec.months[month] = { score, note: note||"", files: files.slice() };
  fillDraft = null;
  document.getElementById("modalHost").innerHTML = "";
  render();
  // 异步写库（完整写入 score + note + files）
  try {
    if (kind === "core") await API.saveOppFill(idx, month, score, note||"", files);
    else                  await API.saveTaskFill(idx, month, score, note||"", files);
  } catch(e) { _apiError("填报保存失败", e); }
};

window.closeFillModal = function(e) {
  if (e && e.target.className !== "mask") return;
  fillDraft = null;
  document.getElementById("modalHost").innerHTML = "";
};

window.editMilestone = function(kind, idx, month) {
  let name, current;
  if (kind === "core") {
    name = DATA.opps[idx].客户;
    current = (state.oppFill[idx]?.milestones?.[month]) || DATA.opps[idx].里程碑[month].目标;
  } else {
    name = DATA.tasks[idx].描述.slice(0,40);
    current = (state.taskFill[idx]?.milestones?.[month]) || DATA.tasks[idx].里程碑[month].目标;
  }
  const host = document.getElementById("modalHost");
  host.innerHTML = `<div class="mask" onclick="window.closeMask(event)">
    <div class="box" onclick="event.stopPropagation()">
      <h3>编辑 ${month} 本月里程碑</h3>
      <div style="font-size:12px;color:var(--mute);margin-bottom:6px">${name}</div>
      <label>本月里程碑目标（1-2 句话说明本月该做到什么，到月底据此评分）</label>
      <textarea id="msInput" rows="3">${current||""}</textarea>
      <div style="font-size:11px;color:var(--mute);line-height:1.6;margin-top:8px">
        例："递交方案并确认商务框架" / "完成 5 位候选人终面" / "平台V1完成内测"。<br>
        月末评分时以此目标达成度判分：100 / 70 / 0 / 不计。
      </div>
      <div class="actions">
        <button class="btn-ghost" onclick="window.closeMask()">取消</button>
        <button class="btn-primary" onclick="window.saveMilestone('${kind}',${idx},'${month}')">保存</button>
      </div>
    </div>
  </div>`;
};

window.saveMilestone = async function(kind, idx, month) {
  const val = document.getElementById("msInput").value;
  const store = kind === "core" ? state.oppFill : state.taskFill;
  const rec = store[idx] = store[idx] || {months:{}, milestones:{}};
  rec.milestones = rec.milestones || {};
  rec.milestones[month] = val;
  const obj = kind === "core" ? DATA.opps[idx] : DATA.tasks[idx];
  obj.里程碑[month].目标 = val;
  window.closeMask();
  render();
  try {
    if (kind === "core") await API.saveOppMilestone(idx, month, val);
    else                  await API.saveTaskMilestone(idx, month, val);
  } catch(e) { _apiError("里程碑保存失败", e); }
};

window.closeMask = function(e) {
  if (e && e.target.className !== "mask") return;
  document.getElementById("modalHost").innerHTML = "";
};

// 还原用户编辑过的里程碑文本
["oppFill","taskFill"].forEach(key => {
  const store = state[key];
  if (!store) return;
  Object.keys(store).forEach(idx => {
    const rec = store[idx];
    if (!rec.milestones) return;
    const obj = key === "oppFill" ? DATA.opps[+idx] : DATA.tasks[+idx];
    if (!obj || !obj.里程碑) return;
    Object.entries(rec.milestones).forEach(([m, v]) => {
      if (obj.里程碑[m]) obj.里程碑[m].目标 = v;
    });
  });
});

document.getElementById("exportBtn").onclick = () => {
  const rows = [["部门","月份","子项","类型/等级","条目","本月里程碑","评分","系数","加权得分"]];
  DEPTS.forEach(d => {
    MONTHS.forEach(m => {
      const { core, special } = collectItems(d, m);
      core.forEach(({idx, opp, milestone}) => {
        const sc = getItemScore("core", idx, m);
        const coef = opp.系数 || 1.2;
        rows.push([d, m, "核心攻坚项", TYPE_LABELS[opp.opp_type], opp.客户, milestone.目标||"",
                   sc==null?"待评":(sc===-1?"不计":sc), coef, sc==null||sc<0?"":(sc*coef).toFixed(1)]);
      });
      special.forEach(({idx, task, milestone}) => {
        const sc = getItemScore("special", idx, m);
        const coef = task.系数 || 1.0;
        rows.push([d, m, "专项任务项", task.等级||"B", task.描述, milestone.目标||"",
                   sc==null?"待评":(sc===-1?"不计":sc), coef, sc==null||sc<0?"":(sc*coef).toFixed(1)]);
      });
    });
  });
  const csv = "﻿" + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "海创元2026绩效考核明细_V3.csv";
  a.click();
};

// resetBtn 在当前 UI 中未渲染按钮元素，做空安全绑定，避免抛错中断后续初始化
const _resetBtn = document.getElementById("resetBtn");
if (_resetBtn) {
  _resetBtn.onclick = async () => {
    if (!confirm("清空全公司填报数据？此操作不可撤销，会影响所有账号。")) return;
    try { await API.reset(); }
    catch(e) { alert("云端清空失败：" + e.message); return; }
    location.reload();
  };
}

// ===== 顶栏用户信息 + 退出按钮 =====
(function bindUserBar() {
  if (!SESSION) return;
  document.getElementById("upName").textContent = SESSION.name;
